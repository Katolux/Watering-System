<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Confirm Delete Variety</title>
</head>
<body>
  <p><a href="/automation/plants/{{ plant[0] }}">← Back to Plant Detail</a></p>

  <h1>Confirm Variety Deletion</h1>

  <p>You selected this variety for deletion:</p>

  <ul>
    <li><strong>Plant:</strong> {{ plant[1] }}</li>
    <li><strong>Variety ID:</strong> {{ variety[0] }}</li>
    <li><strong>Variety name:</strong> {{ variety[1] }}</li>
    <li><strong>Notes:</strong> {{ variety[2] or "-" }}</li>
  </ul>

  <form method="post" action="/automation/plants/{{ plant[0] }}/varieties/{{ variety[0] }}/delete-confirm">
    <button type="submit">Yes, delete this variety</button>
  </form>
</body>
</html>
