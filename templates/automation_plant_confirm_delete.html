<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Confirm Delete Plant</title>
</head>
<body>
  <p><a href="/automation/plants">← Back to Plant Encyclopedia</a></p>

  <h1>Confirm Plant Deletion</h1>

  <p>You selected this plant for deletion:</p>

  <ul>
    <li><strong>ID:</strong> {{ plant[0] }}</li>
    <li><strong>Name:</strong> {{ plant[1] }}</li>
    <li><strong>Scientific name:</strong> {{ plant[2] or "-" }}</li>
  </ul>

  <p><strong>This will remove the plant, its varieties, and its plantings.</strong></p>

  <form method="post" action="/automation/plants/{{ plant[0] }}/delete-confirm">
    <button type="submit">Yes, delete this plant</button>
  </form>
</body>
</html>
